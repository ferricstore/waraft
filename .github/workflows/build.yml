name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: OTP ${{ matrix.otp }}
    runs-on: ubuntu-latest
    container:
      image: erlang:${{ matrix.otp }}
    strategy:
      fail-fast: false
      matrix:
        otp:
          - "27"
          - "28"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache rebar3
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: ${{ runner.os }}-otp-${{ matrix.otp }}-rebar3-${{ hashFiles('rebar.lock', 'rebar.config') }}
          restore-keys: |
            ${{ runner.os }}-otp-${{ matrix.otp }}-rebar3-

      - name: Compile
        run: rebar3 compile

      - name: Xref
        run: rebar3 xref

      - name: Common Test if present
        shell: bash
        run: |
          if [ -d test ] && find test -name '*_SUITE.erl' -print -quit | grep -q .; then
            rebar3 ct
          else
            echo "No Common Test suites found; skipping rebar3 ct."
          fi

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: Generate docs
        if: matrix.otp == '27'
        run: rebar3 edoc
